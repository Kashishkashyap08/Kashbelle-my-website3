<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kashbelle - Premium Aesthetic Fashion</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #fdfbf9;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Premium Responsive App Container with Notch Safe-Area & Sleek Border */
.app-container {
    width: 100%;
    max-width: 480px; /* Standard Mobile Frame */
    min-height: 100vh;
    background: white;
    box-shadow: 0 10px 30px rgba(199, 162, 124, 0.15);
    
    /* Premium Look Border */
    border: 6px solid #c7a27c; 
    border-radius: 32px; /* Smooth rounded corners like a native smartphone */
    
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin: 10px 0; /* Aesthetic spacing on desktop view */
}

/* CAMERA NOTCH / STATUS BAR SAFE AREA GAP */
.status-bar-gap {
    height: 35px; /* Creates a perfect safe gap for the phone camera punch-hole/notch */
    background: white;
    width: 100%;
}

/* FIXED NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    background: white;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f9f6f2;
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
}

.logo img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid #c7a27c;
}

.logo span {
    font-size: 20px;
    font-weight: 700;
    color: #c7a27c;
    letter-spacing: 0.5px;
}

.right-icons {
    display: flex;
    align-items: center;
    gap: 16px;
}

.icon-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    position: relative;
    text-decoration: none;
    color: #222;
}

.badge {
    position: absolute;
    top: -4px;
    right: -6px;
    background: #c7a27c;
    color: white;
    font-size: 10px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
}

/* PROFILE DROPDOWN */
.profile-menu {
    display: none;
    position: absolute;
    top: 90px; /* Adjusted due to gap setup */
    right: 18px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    padding: 8px;
    width: 160px;
    z-index: 1001;
    border: 1px solid #f4f1ed;
}

.profile-menu a {
    display: block;
    padding: 12px;
    text-decoration: none;
    color: #444;
    font-size: 13px;
    border-bottom: 1px solid #f9f6f2;
    font-weight: 500;
}

.profile-menu a:last-child {
    border: none;
    color: #d9534f;
}

/* MAIN CONTENT AREA */
.main-content {
    padding: 18px;
    padding-bottom: 100px; /* Safe space for bottom navigation bar */
    flex-grow: 1;
}

/* SEARCH BAR */
.search-box {
    display: flex;
    background: #f5f2ee;
    padding: 14px 16px;
    border-radius: 18px;
    margin-bottom: 22px;
    align-items: center;
}

.search-box input {
    border: none;
    background: none;
    width: 100%;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: #333;
}

/* HERO BANNER */
.hero-banner {
    width: 100%;
    height: 190px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    margin-bottom: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.hero-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-text {
    position: absolute;
    bottom: 22px;
    left: 22px;
    color: white;
}

.hero-text h2 {
    font-size: 24px;
    font-weight: 600;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

/* CATEGORIES */
.section-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 14px;
    color: #222;
    letter-spacing: 0.3px;
}

.categories {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 10px;
    margin-bottom: 25px;
}

.categories::-webkit-scrollbar {
    display: none;
}

.cat-btn {
    padding: 10px 22px;
    background: #fcfbfa;
    border: 1px solid #e7d8c9;
    border-radius: 25px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: 0.3s;
    color: #555;
}

.cat-btn.active, .cat-btn:hover {
    background: black;
    color: white;
    border-color: black;
}

/* PRODUCT CARDS GRID */
.product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.product-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    position: relative;
    border: 1px solid #f5f2ee;
}

.product-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    cursor: pointer;
}

.wish-icon {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255, 255, 255, 0.9);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}

.product-info {
    padding: 14px;
}

.product-info h3 {
    font-size: 13px;
    color: #444;
    font-weight: 500;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.product-price {
    font-weight: 600;
    font-size: 15px;
    color: black;
    margin-bottom: 12px;
}

.add-btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 22px;
    background: black;
    color: white;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.add-btn:active {
    transform: scale(0.97);
}

/* FIXED BOTTOM NAVIGATION BAR WITH SCALING INSIDE BORDER */
.bottom-nav {
    position: fixed;
    bottom: 6px; /* Shifted up slightly due to bottom rounded border */
    width: calc(100% - 12px); /* Perfectly aligns inside the 6px borders */
    max-width: 468px; 
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    padding: 16px 10px;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.03);
    z-index: 1000;
    border-radius: 24px 24px 26px 26px; /* Smooth integration with mobile layout */
}

.bottom-nav a {
    text-decoration: none;
    color: #888;
    font-size: 13px;
    font-weight: 500;
    transition: 0.2s;
}

.bottom-nav a.active {
    color: #c7a27c;
    font-weight: 700;
}
</style>
</head>
<body>

<div class="app-container">

    <div class="status-bar-gap"></div>

    <div class="navbar">
        <a href="index.html" class="logo">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" alt="Kashbelle Logo">
            <span>Kashbelle</span>
        </a>
        <div class="right-icons">
            <a href="wishlist.html" class="icon-btn">❤️</a>
            <a href="cart.html" class="icon-btn">
                🛒<span class="badge" id="cartCount">0</span>
            </a>
            <button class="icon-btn" onclick="toggleProfile()">👤</button>
        </div>
    </div>

    <div class="profile-menu" id="profileDropdown">
        <a href="profile.html">My Account</a>
        <a href="orders.html">My Orders</a>
        <a href="Login.html">Logout</a>
    </div>

    <div class="main-content">
        
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search aesthetic outfits...">
        </div>

        <div class="hero-banner">
            <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b" alt="Banner">
            <div class="hero-text">
                <h2>Autumn Aesthetics</h2>
                <p>Flat 20% OFF on premium fits</p>
            </div>
        </div>

        <div class="section-title">Shop by Category</div>
        <div class="categories">
            <button class="cat-btn active" onclick="filterProducts('All')">All</button>
            <button class="cat-btn" onclick="filterProducts('Dresses')">Dresses</button>
            <button class="cat-btn" onclick="filterProducts('Tops')">Tops</button>
            <button class="cat-btn" onclick="filterProducts('Coats')">Coats</button>
        </div>

        <div class="section-title">Trending Now ✨</div>
        <div class="product-grid">
            
            <div class="product-card" data-category="Dresses">
                <div class="wish-icon" onclick="toggleWishlist(this, 'Luxury Beige Dress', 1299)">🤍</div>
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" onclick="goToProduct()" alt="Dress">
                <div class="product-info">
                    <h3>Luxury Beige Dress</h3>
                    <p class="product-price">₹1299</p>
                    <button class="add-btn" onclick="addToCart('Luxury Beige Dress', 1299)">Add to Cart</button>
                </div>
            </div>

            <div class="product-card" data-category="Tops">
                <div class="wish-icon" onclick="toggleWishlist(this, 'Korean Soft Top', 899)">🤍</div>
                <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b" onclick="goToProduct()" alt="Top">
                <div class="product-info">
                    <h3>Korean Soft Top</h3>
                    <p class="product-price">₹899</p>
                    <button class="add-btn" onclick="addToCart('Korean Soft Top', 899)">Add to Cart</button>
                </div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="active">Home</a>
        <a href="products.html">Shop</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
    </div>

</div>

<script>
function toggleProfile() {
    let menu = document.getElementById("profileDropdown");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function goToProduct() {
    window.location.href = "product.html";
}

function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, price, qty: 1});
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    alert(name + " added to cart 🛒");
}

function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let badge = document.getElementById("cartCount");
    if(badge) badge.innerHTML = cart.length;
}

function toggleWishlist(btn, name, price) {
    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
    if(btn.innerHTML === "🤍") {
        btn.innerHTML = "❤️";
        wishlist.push({name, price});
        alert("Added to Wishlist 💖");
    } else {
        btn.innerHTML = "🤍";
        wishlist = wishlist.filter(item => item.name !== name);
    }
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
}

function searchProducts() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".product-card");
    cards.forEach(card => {
        let name = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

function filterProducts(category) {
    let buttons = document.querySelectorAll(".cat-btn");
    buttons.forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    let cards = document.querySelectorAll(".product-card");
    cards.forEach(card => {
        if(category === "All" || card.getAttribute("data-category") === category) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}

// Initial Call
updateCartCount();
</script>
</body>
</html>
